<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi TT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="app">
    <section class="summary-card">
      <p class="kicker">Suivi télétravail</p>
      <h1>Jours faits en TT</h1>
      <div class="tt-count-wrap">
        <span id="ttCount" class="tt-count">0</span>
        <span class="tt-label">jours</span>
      </div>
      <p id="ttPercent" class="tt-percent">0.0% sur 64 jours de formation (année en cours)</p>
      <p id="syncStatus" class="sync-status" aria-live="polite">Synchronisation...</p>
      <p class="hint">Clique sur un jour du calendrier pour l'ajouter ou le retirer.</p>
    </section>

    <section class="calendar-card" aria-label="Calendrier TT">
      <header class="calendar-header">
        <button id="prevMonth" class="nav-btn" aria-label="Mois précédent">&larr;</button>
        <h2 id="monthLabel">Mois Année</h2>
        <button id="nextMonth" class="nav-btn" aria-label="Mois suivant">&rarr;</button>
      </header>

      <div class="weekday-row" aria-hidden="true">
        <span>Lun</span>
        <span>Mar</span>
        <span>Mer</span>
        <span>Jeu</span>
        <span>Ven</span>
        <span>Sam</span>
        <span>Dim</span>
      </div>

      <div id="calendarGrid" class="calendar-grid" role="grid" aria-label="Grille calendrier"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
